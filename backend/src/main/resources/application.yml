spring:
  datasource:
    url: jdbc:sqlite:salary.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: never
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080
  error:
    include-message: always

app:
  seed:
    enabled: false
